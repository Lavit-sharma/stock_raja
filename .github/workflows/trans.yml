name: Fetch Transcript

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python my.py "https://www.youtube.com/watch?v=huW5sxhm3ow"
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          WP_TABLE_PREFIX: wp_

      # Optional: keep this only if you STILL want file download
      - name: Upload transcript (optional)
        uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: transcript.txt
