- cron: "0 9 * * 1-5"    # 2:30 PM IST
- cron: "0 10 * * 1-5"   # 3:30 PM IST
- cron: "0 11 * * 1-5"   # 4:30 PM IST
- cron: "0 12 * * 1-5"   # 5:30 PM IST
- cron: "0 13 * * 1-5"   # 6:30 PM IST
- cron: "0 14 * * 1-5"   # 7:30 PM IST
- cron: "0 15 * * 1-5"   # 8:30 PM IST
- cron: "0 16 * * 1-5"   # 9:30 PM IST
