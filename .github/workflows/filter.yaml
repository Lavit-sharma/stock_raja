name: Filter Screenshot Bot

on:
  workflow_dispatch:   # Manual Run Button
     # Monday-Friday

jobs:
  run-bot:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install pandas selenium webdriver-manager gspread mysql-connector-python

      - name: Run Filter Script
        env:
          # 🔹 Database
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}

          # 🔹 Google Sheets
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}

          # 🔹 TradingView Cookies
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}

        run: |
          python filter.py
