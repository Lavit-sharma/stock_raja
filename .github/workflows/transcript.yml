name: YouTube Transcript Bot

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true

jobs:
  run-transcript:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Libraries
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir mysql-connector-python youtube-transcript-api==1.2.4

      - name: Create Cookies File
        # This fixes your "echo "" > cookies.txt" issue by using the actual secret
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
          # Verify the file is not empty in logs (hidden if secret is masked)
          ls -l cookies.txt

      - name: Run Transcript Bot
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python transcript_downloader.py "${{ github.event.inputs.video_url }}"
