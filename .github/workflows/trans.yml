name: Fetch Latest 3 Transcripts

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'YouTube Channel or Video URL'
        required: true
        default: 'https://www.youtube.com/@SMKC'
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager pymysql requests
          sudo apt-get install -y google-chrome-stable

      - name: Run Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          # Use manual input if available, otherwise use default channel
          python my.py "${{ github.event.inputs.target_url || 'https://www.youtube.com/@SMKC' }}"
