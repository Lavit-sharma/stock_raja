name: Live Screen Bot

on:
  workflow_dispatch:
  push:
    branches:
      - main        # Triggers one run immediately when you push/add this file
  schedule:
    - cron: "30 4 * * 1-5"    # 9:30 AM IST - Market Open
    - cron: "0 5 * * 1-5"     # 10:30 AM IST
    - cron: "0 6 * * 1-5"     # 11:30 AM IST
    - cron: "0 7 * * 1-5"     # 12:30 PM IST
    - cron: "0 8 * * 1-5"     # 1:30 PM IST
    - cron: "0 9 * * 1-5"     # 2:30 PM IST
    - cron: "0 10 * * 1-5"    # 3:30 PM IST - Market Close

jobs:
  run-bot:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Dependencies
        run: |
          pip install selenium webdriver-manager mysql-connector-python gspread pandas pytz

      - name: Run Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
        run: python livescreen.py
