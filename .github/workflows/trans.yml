name: Fetch Transcript

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pymysql selenium webdriver-manager

      - name: Run script
        run: python my.py "https://www.youtube.com/watch?v=huW5sxhm3ow"

      - name: Upload transcript
        uses: actions/upload-artifact@v4
        with:
          name: transcript
          path: transcript.txt
