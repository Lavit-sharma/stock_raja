name: Run Stock Chart Scraper

on:
  # Allows manual execution anytime from the GitHub Actions tab
  workflow_dispatch:
  # Automatically runs every day at 1:30 PM IST (08:00 UTC)


jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Google Chrome Browser
      uses: browser-actions/setup-chrome@v2
      with:
        chrome-version: stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gspread pandas mysql-connector-python selenium webdriver-manager

    - name: Run Scraper Script
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
        TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
      run: python livescreen.py
