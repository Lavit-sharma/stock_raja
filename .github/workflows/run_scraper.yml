name: Run Stock Chart Scraper

on:
  # Allows manual execution anytime from the GitHub Actions tab
  workflow_dispatch:
  # Automatically runs every day at 12:50 PM IST (07:20 UTC)
  schedule:
    - cron: '20 7 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Google Chrome Browser
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl unzip
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gspread pandas mysql-connector-python selenium webdriver-manager

    - name: Run Scraper Script
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
        TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
      run: python livescreen.py
