name: Another Screenshot Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '30 13 * * *'   # 7:00 PM IST

jobs:
  prepare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Chrome and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          pip install --upgrade pip
          pip install pandas selenium webdriver-manager gspread mysql-connector-python requests Pillow

      - name: Truncate table once
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: 3306
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          START_ROW: "0"
          END_ROW: "0"
          BATCH_SIZE: "100"
          MAX_THREADS: "1"
          TRUNCATE_ON_START: "1"
        run: python another-screen.py

  run-bot:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - start_row: 0
            end_row: 500
          - start_row: 500
            end_row: 1000
          - start_row: 1000
            end_row: 1500
          - start_row: 1500
            end_row: 2000
          - start_row: 2000
            end_row: 2550

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Chrome and Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          pip install --upgrade pip
          pip install pandas selenium webdriver-manager gspread mysql-connector-python requests Pillow

      - name: Run Script ${{ matrix.start_row }}-${{ matrix.end_row }}
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: 3306
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          START_ROW: "${{ matrix.start_row }}"
          END_ROW: "${{ matrix.end_row }}"
          BATCH_SIZE: "100"
          MAX_THREADS: "3"
          TRUNCATE_ON_START: "0"
        run: python another-screen.py
