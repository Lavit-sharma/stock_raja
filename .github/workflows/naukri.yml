name: Naukri Scraper

on:
  schedule:
    - cron: "0 3 * * *"   # daily at 3 AM UTC (~8:30 AM IST)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run scraper
        run: node index.js
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
