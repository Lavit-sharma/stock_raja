name: Hello World Test
on:
  workflow_dispatch:
  schedule:
    - cron: "10 15 * * *"   # 8:40 PM IST
jobs:
  hello:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run Script
        run: python hello.py
