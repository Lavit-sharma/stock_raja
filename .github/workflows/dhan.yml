name: dhan download

on:
  workflow_dispatch:

jobs:
  download-data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Packages
        run: |
          pip install --upgrade pip
          pip install pandas gspread kiteconnect

      # ✅ Proper JSON writing for Google Sheets API authentication
      - name: Create credentials.json
        run: |
          printf "%s" '${{ secrets.GSPREAD_CREDENTIALS }}' > credentials.json

      # ✅ Optional debug (Safely logs start of authentication parameters)
      - name: Debug Environment
        run: |
          echo "---- credentials.json profile head ----"
          head -n 5 credentials.json

      - name: Run Intraday Data Downloader
        env:
          PYTHONUNBUFFERED: "1"
          ZERODHA_API_KEY: ${{ secrets.ZERODHA_API_KEY }}
          ZERODHA_ACCESS_TOKEN: ${{ secrets.ZERODHA_ACCESS_TOKEN }}
          SHARD_INDEX: "0"
          SHARD_SIZE: "500"
        run: python dhan.py
