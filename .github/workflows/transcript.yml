name: YouTube Transcript Bot

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube Video URL'
        required: true

jobs:
  run-transcript:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          # NO CACHE - Forces a clean environment every run

      - name: Clean Install Libraries
        run: |
          pip install --upgrade pip
          # Use --no-cache-dir to prevent picking up broken local copies
          pip install --no-cache-dir mysql-connector-python youtube-transcript-api==1.2.4

      - name: Run Transcript Bot
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python transcript_downloader.py "${{ github.event.inputs.video_url }}"
