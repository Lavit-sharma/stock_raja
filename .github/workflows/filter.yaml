name: Filter Screenshot Bot

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas selenium webdriver-manager gspread mysql-connector-python requests

      - name: Debug Secret Availability
        run: |
          echo "Checking if secrets are injected into GitHub Runner..."
          if [ -z "${{ secrets.DB_HOST }}" ]; then echo "❌ CRITICAL: DB_HOST secret is completely empty or missing in GitHub Settings!"; exit 1; fi
          if [ -z "${{ secrets.DB_USER }}" ]; then echo "❌ CRITICAL: DB_USER secret is empty!"; exit 1; fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then echo "❌ CRITICAL: DB_PASSWORD secret is empty!"; exit 1; fi
          if [ -z "${{ secrets.DB_NAME }}" ]; then echo "❌ CRITICAL: DB_NAME secret is empty!"; exit 1; fi
          if [ -z "${{ secrets.GSPREAD_CREDENTIALS }}" ]; then echo "❌ CRITICAL: GSPREAD_CREDENTIALS secret is empty!"; exit 1; fi
          echo "✅ All secrets present in configuration."

      - name: Run Filter Script
        env:
          TZ: Asia/Kolkata
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
        run: |
          python filter.py
