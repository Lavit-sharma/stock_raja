name: Download YouTube Transcript

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # ✅ INSTALL ALL REQUIRED PACKAGES
      - name: Install Dependencies
        run: |
          pip install requests beautifulsoup4 selenium webdriver-manager pymysql

      - name: Run Script (Latest Videos)
        run: python my.py

      - name: Upload Transcripts
        uses: actions/upload-artifact@v4
        with:
          name: transcripts
          path: |
            transcript*.txt
            downloads/*.txt
