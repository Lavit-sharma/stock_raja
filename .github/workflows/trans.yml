name: Fetch Latest 3 Transcripts

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'YouTube Channel or Video URL'
        required: true
        default: 'https://www.youtube.com/@SMKC'
  push:
    branches: [ main ]

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Chrome and Dependencies
        run: |
          # Install System Chrome
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
          # Install Python Libraries (Added beautifulsoup4 and lxml)
          pip install selenium webdriver-manager pymysql requests beautifulsoup4 lxml

      - name: Run Scraper
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python my.py "${{ github.event.inputs.target_url || 'https://www.youtube.com/@SMKC' }}"

      - name: Upload Logs if Failed
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: error-logs
          path: transcript.txt
