name: Filter Screenshot Bot

on:
  workflow_dispatch:
  schedule:
    # 7:00 PM IST = 1:30 PM UTC
    - cron: "30 13 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # ✅ Install Chrome (IMPORTANT for Selenium)
      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Dependencies
        run: |
          pip install pandas selenium webdriver-manager gspread mysql-connector-python requests

      # ✅ Market check (NON-BLOCKING)
      - name: Check if market is open
        env:
          TZ: Asia/Kolkata
        run: |
          python - <<'PY'
          import sys
          import re
          import requests
          from datetime import datetime

          today = datetime.now().date()
          weekday = today.weekday()

          # 👉 DO NOT BLOCK (for testing)
          if weekday >= 5:
              print(f"⚠️ Weekend detected ({today}) - continuing for testing")

          headers = {
              "User-Agent": "Mozilla/5.0",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "en-US,en;q=0.9"
          }

          holiday_url = "https://www.nseindia.com/resources/exchange-communication-holidays"

          try:
              session = requests.Session()
              session.get("https://www.nseindia.com", headers=headers, timeout=30)

              response = session.get(holiday_url, headers=headers, timeout=30)
              html = response.text

              raw_dates = re.findall(r'\b\d{1,2}-[A-Za-z]{3}-\d{4}\b', html)

              holiday_dates = set()
              for d in raw_dates:
                  try:
                      holiday_dates.add(datetime.strptime(d, "%d-%b-%Y").date())
                  except:
                      pass

              if today in holiday_dates:
                  print(f"⚠️ NSE holiday detected ({today}) - continuing")

              print(f"✅ Market check complete")

          except Exception as e:
              print(f"⚠️ Holiday check failed: {e}")
          PY

      # ✅ MAIN SCRIPT (ALWAYS RUN)
      - name: Run Filter Script
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
          TRADINGVIEW_COOKIES: ${{ secrets.TRADINGVIEW_COOKIES }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          python filter.py
